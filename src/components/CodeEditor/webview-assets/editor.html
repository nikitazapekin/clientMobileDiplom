<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="monaco-editor.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        #container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
        .run-button-container {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
        }
        .run-button {
            background-color: #4CAF50;
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            transition: background-color 0.3s;
        }
        .run-button:active {
            background-color: #45a049;
        }
        .run-button.disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        .run-icon {
            width: 0;
            height: 0;
            border-left: 10px solid white;
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
            margin-left: 4px;
        }
        .language-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background-color: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-family: monospace;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <div class="run-button-container" id="runButtonContainer" style="display: none;">
        <button class="run-button" id="runButton" onclick="onRunClick()">
            <div class="run-icon"></div>
        </button>
    </div>
    <div class="language-badge" id="languageBadge"></div>

    <script src="monaco-editor.min.js"></script>
    <script>
        let editor;
        let currentLanguage = 'javascript';
        let isReadOnly = false;
        
        // Соответствие языков
        const languageMap = {
            javascript: 'javascript',
            python: 'python',
            csharp: 'csharp',
            java: 'java',
            golang: 'go'
        };

        function initializeMonaco() {
            require.config({ paths: { vs: '.' } });
            
            require(['vs/editor/editor.main'], function() {
                editor = monaco.editor.create(document.getElementById('container'), {
                    value: '',
                    language: languageMap[currentLanguage] || 'plaintext',
                    theme: 'vs-dark',
                    minimap: { enabled: false },
                    fontSize: 14,
                    lineNumbers: 'on',
                    scrollBeyondLastLine: false,
                    wordWrap: 'on',
                    automaticLayout: true,
                    suggest: { 
                        showKeywords: true, 
                        showSnippets: true 
                    },
                    quickSuggestions: true,
                    tabSize: 2,
                    padding: { top: 40 },
                    readOnly: isReadOnly
                });

                // Отправляем изменения в React Native
                editor.onDidChangeModelContent(() => {
                    if (window.ReactNativeWebView) {
                        window.ReactNativeWebView.postMessage(JSON.stringify({
                            type: 'change',
                            value: editor.getValue()
                        }));
                    }
                });

                // Устанавливаем начальное значение если есть
                if (window.initialValue) {
                    editor.setValue(window.initialValue);
                }
            });
        }

        // Обработчик клика по кнопке запуска
        function onRunClick() {
            if (window.ReactNativeWebView) {
                window.ReactNativeWebView.postMessage(JSON.stringify({
                    type: 'run'
                }));
            }
        }

        // Получение сообщений от React Native
        window.addEventListener('message', function(event) {
            const data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
            
            switch(data.type) {
                case 'setValue':
                    if (editor) {
                        editor.setValue(data.value);
                    } else {
                        window.initialValue = data.value;
                    }
                    break;
                    
                case 'setLanguage':
                    currentLanguage = data.language;
                    if (editor) {
                        monaco.editor.setModelLanguage(
                            editor.getModel(), 
                            languageMap[currentLanguage] || 'plaintext'
                        );
                    }
                    document.getElementById('languageBadge').textContent = 
                        data.language.charAt(0).toUpperCase() + data.language.slice(1);
                    break;
                    
                case 'setReadOnly':
                    isReadOnly = data.readOnly;
                    if (editor) {
                        editor.updateOptions({ readOnly: isReadOnly });
                    }
                    break;
                    
                case 'showRunButton':
                    document.getElementById('runButtonContainer').style.display = 
                        data.show ? 'block' : 'none';
                    break;
                    
                case 'setRunLoading':
                    const runButton = document.getElementById('runButton');
                    if (data.loading) {
                        runButton.classList.add('disabled');
                        runButton.disabled = true;
                    } else {
                        runButton.classList.remove('disabled');
                        runButton.disabled = false;
                    }
                    break;
            }
        });

        // Инициализация при загрузке
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeMonaco);
        } else {
            initializeMonaco();
        }
    </script>
</body>
</html>
